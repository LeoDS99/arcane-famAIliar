services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - ./indice.json:/app/indice.json
      - ./uploads:/app/uploads
      - ./indici:/app/indici
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend